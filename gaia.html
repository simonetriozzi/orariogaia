<!DOCTYPE html>
<html lang="it">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OrarioGaia">
  <meta name="theme-color" content="#fdf5f8">
  <link rel="apple-touch-icon" href="https://simonetriozzi.github.io/orariogaia/apple-touch-icon.png">
  
  <!-- iPhone 14, 13, 12, 14 Pro -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 390px) and (device-height: 844px) and (-webkit-device-pixel-ratio: 3)" href="splash_1170x2532.png">
  <!-- iPhone 16, 15, 14 Pro -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 393px) and (device-height: 852px) and (-webkit-device-pixel-ratio: 3)" href="splash_1179x2556.png">
  <!-- iPhone 16 Pro Max, 15 Pro Max, 14 Pro Max -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 430px) and (device-height: 932px) and (-webkit-device-pixel-ratio: 3)" href="splash_1290x2796.png">
  <!-- iPhone 14 Plus, 13 Pro Max, 12 Pro Max -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 428px) and (device-height: 926px) and (-webkit-device-pixel-ratio: 3)" href="splash_1284x2778.png">
  <!-- iPhone 11, XR -->
  <link rel="apple-touch-startup-image" media="screen and (device-width: 414px) and (device-height: 896px) and (-webkit-device-pixel-ratio: 2)" href="splash_828x1792.png">
  
  <link rel="manifest" href="manifest_gaia.json">
  <title>OrarioGaia — Ciao Gaia!!!</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Inter:wght@400;500;600;700&display=swap"
    rel="stylesheet">
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --bordeaux: #6b1a3a;
      --bordeaux-l: #9b2d5a;
      --bordeaux-xl: #c45a80;
      --bordeaux-pale: #f7e8ef;
      --rose: #f2d0df;
      --cream: #fdf5f8;
      --text: #2d0e1c;
      --text-soft: #7a4057;
      --border: rgba(107, 26, 58, 0.15);
      --radius: 20px;
      --radius-sm: 12px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--cream);
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(155, 45, 90, 0.08) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(107, 26, 58, 0.06) 0%, transparent 50%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px 60px;
      padding-top: calc(28px + env(safe-area-inset-top));
      padding-bottom: calc(60px + env(safe-area-inset-bottom));
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }
    
    html, body {
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    *::-webkit-scrollbar {
      display: none;
    }

    /* === BACK LINK === */
    .back-link {
      align-self: flex-start;
      margin-bottom: 20px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--bordeaux);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .back-link:hover {
      opacity: 1;
    }

    /* === HEADER === */
    .header {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeInDown 0.5s ease-out;
    }

    .header .petals {
      font-size: 1.6rem;
      letter-spacing: 4px;
      margin-bottom: 8px;
    }

    .header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 800;
      background: linear-gradient(135deg, var(--bordeaux) 0%, var(--bordeaux-xl) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: -0.5px;
    }

    .header p {
      color: var(--text-soft);
      font-size: 0.95rem;
      margin-top: 6px;
    }

    /* === CHOICE BUTTONS === */
    .choices {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 32px;
      animation: fadeInUp 0.5s ease-out;
    }

    .choice-btn {
      padding: 18px 32px;
      background: #fff;
      border: 2px solid var(--border);
      border-radius: var(--radius);
      font-size: 1.3rem;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      color: var(--bordeaux);
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(107, 26, 58, 0.1);
      transition: all 0.2s;
      position: relative;
      overflow: hidden;
    }

    .choice-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--bordeaux), var(--bordeaux-l));
      opacity: 0;
      transition: opacity 0.2s;
    }

    .choice-btn:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 28px rgba(107, 26, 58, 0.22);
    }

    .choice-btn:hover::before {
      opacity: 1;
    }

    .choice-btn:hover span {
      color: #fff;
      position: relative;
      z-index: 1;
    }

    .choice-btn.active {
      background: linear-gradient(135deg, var(--bordeaux), var(--bordeaux-l));
      color: #fff;
      border-color: transparent;
    }

    .choice-btn.active span {
      color: #fff;
    }

    .choice-btn span {
      position: relative;
      z-index: 1;
    }

    /* === PANEL === */
    .panel {
      width: 100%;
      max-width: 460px;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 6px 30px rgba(107, 26, 58, 0.08);
      animation: fadeInUp 0.4s ease-out;
    }

    .panel+.panel {
      margin-top: 18px;
    }

    .panel-title {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--bordeaux);
      margin-bottom: 16px;
    }

    /* === TRAIN CARDS === */
    .train-card {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px 16px;
      margin-bottom: 10px;
      background: var(--bordeaux-pale);
      border: 1px solid rgba(107, 26, 58, 0.1);
      border-radius: var(--radius-sm);
      animation: fadeInUp 0.35s ease-out both;
    }

    .train-card:nth-child(2) {
      animation-delay: 0.06s;
    }

    .train-card:nth-child(3) {
      animation-delay: 0.12s;
    }

    .train-time {
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--bordeaux);
      min-width: 68px;
      font-variant-numeric: tabular-nums;
    }

    .train-info {
      flex: 1;
    }

    .train-dest {
      font-size: 0.88rem;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 2px;
    }

    .train-wait {
      font-size: 0.78rem;
      color: var(--text-soft);
    }

    .train-eta {
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--bordeaux-l);
      min-width: 50px;
      text-align: right;
    }

    .train-eta span {
      font-size: 0.68rem;
      font-weight: 500;
      color: var(--text-soft);
    }

    /* Alta frequenza */
    .freq-banner {
      text-align: center;
      padding: 20px;
      background: var(--bordeaux-pale);
      border: 1px solid rgba(107, 26, 58, 0.12);
      border-radius: var(--radius-sm);
    }

    .freq-banner .icon {
      font-size: 1.8rem;
      margin-bottom: 8px;
    }

    .freq-banner .freq-text {
      font-size: 1.05rem;
      font-weight: 700;
      color: var(--bordeaux);
    }

    .freq-banner .freq-sub {
      font-size: 0.8rem;
      color: var(--text-soft);
      margin-top: 4px;
    }



    /* === MILANO SEARCH === */
    .search-wrap {
      position: relative;
    }

    .search-input {
      width: 100%;
      padding: 12px 16px 12px 42px;
      background: var(--bordeaux-pale);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-family: inherit;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input:focus {
      border-color: var(--bordeaux-l);
    }

    .search-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 1rem;
      pointer-events: none;
    }

    .suggestions {
      position: absolute;
      top: calc(100% + 6px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      box-shadow: 0 8px 24px rgba(107, 26, 58, 0.12);
      z-index: 10;
      overflow: hidden;
      max-height: 280px;
      overflow-y: auto;
    }

    .suggestion-item {
      padding: 12px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 500;
      color: var(--text);
      transition: background 0.15s;
      border-bottom: 1px solid var(--border);
    }

    .suggestion-item:last-child {
      border-bottom: none;
    }

    .suggestion-item:hover {
      background: var(--bordeaux-pale);
      color: var(--bordeaux);
    }

    .suggestion-item mark {
      background: none;
      color: var(--bordeaux);
      font-weight: 700;
    }

    /* Load more button */
    .more-btn {
      display: block; width: 100%; padding: 14px;
      margin-top: 10px; background: rgba(107,26,58,0.05);
      border: 1px dashed rgba(107,26,58,0.25); border-radius: var(--radius-sm);
      color: var(--bordeaux); font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .more-btn:hover { background: rgba(107,26,58,0.1); border-color: rgba(107,26,58,0.4); }

    /* === LOADING / EMPTY === */
    .empty, .loading {
      text-align: center;
      padding: 24px;
      color: var(--text-soft);
    }

    .loading .spinner {
      display: inline-block;
      width: 22px;
      height: 22px;
      border: 3px solid var(--border);
      border-top-color: var(--bordeaux-l);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin-bottom: 10px;
    }

    .empty {
      text-align: center;
      padding: 20px;
      color: var(--text-soft);
      font-size: 0.9rem;
    }

    /* === ANIMATIONS === */
    @keyframes fadeInDown {
      from {
        opacity: 0;
        transform: translateY(-12px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(10px);
      }

      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* === FAB & MODAL === */
    .fab-time {
      position: fixed;
      bottom: 24px;
      right: 24px;
      width: 56px;
      height: 56px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--bordeaux), var(--bordeaux-l));
      color: white;
      font-size: 1.5rem;
      border: none;
      box-shadow: 0 4px 12px rgba(107, 26, 58, 0.3);
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      z-index: 100;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .fab-time:hover { transform: scale(1.05); box-shadow: 0 6px 16px rgba(107, 26, 58, 0.4); }

    .modal-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(45, 14, 28, 0.6);
      z-index: 200;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
      backdrop-filter: blur(4px);
      -webkit-backdrop-filter: blur(4px);
      animation: fadeIn 0.2s;
    }
    .modal-content {
      background: var(--cream);
      width: 100%;
      max-width: 320px;
      border-radius: var(--radius);
      padding: 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.3);
      animation: popIn 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }
    .modal-header h3 { font-size: 1.1rem; margin: 0; color: var(--bordeaux); }
    .modal-close {
      background: none; border: none; font-size: 1.8rem;
      line-height: 1; cursor: pointer; color: var(--text-soft);
    }
    @keyframes popIn {
      from { opacity: 0; transform: scale(0.9); }
      to { opacity: 1; transform: scale(1); }
    }
    @keyframes fadeIn {
      from { opacity: 0; }
      to { opacity: 1; }
    }

    @media (max-width: 480px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .choice-btn {
        padding: 14px 22px;
        font-size: 1.1rem;
      }
    }
  </style>
</head>

<body>

  <div class="header">
    <div class="petals">🌸 🌷 🌸</div>
    <h1>Ciao Gaia, dove vai?</h1>
    <p>Seleziona la tua destinazione!</p>
  </div>

  <!-- SCELTE -->
  <div class="choices">
    <button class="choice-btn" id="btn-casa" onclick="scegliPercorso('casa')"><span>Esco! 😁</span></button>
    <button class="choice-btn" id="btn-milano" onclick="scegliPercorso('milano')"><span>A casa! 🏡</span></button>
  </div>

  <div id="main-content" style="width:100%;max-width:460px"></div>

  <div style="margin-top:40px;width:100%;max-width:460px;display:flex;justify-content:center;">
    <a href="index.html" class="back-link" style="align-self:center;margin-bottom:0;">← Torna alla home</a>
  </div>

  <button class="fab-time" onclick="apriModalTime()">
    🕒
  </button>

  <div class="modal-overlay" id="time-modal" style="display:none;" onclick="chiudiModalTime(event)">
    <div class="modal-content" onclick="event.stopPropagation()">
      <div class="modal-header">
        <h3>Modifica data e orario</h3>
        <button class="modal-close" onclick="chiudiModalTime()">×</button>
      </div>
      <div class="modal-body">
        <div style="display:flex; flex-direction:column; gap: 12px;">
        <input type="date" id="inp-date" style="padding:12px; border-radius:8px; border:1px solid var(--border); width:100%; font-family:inherit; font-size:1rem; outline:none; color:var(--text);">
        <div style="display:flex; gap: 12px;">
          <input type="time" id="inp-time" style="flex:1; padding:12px; border-radius:8px; border:1px solid var(--border); font-family:inherit; font-size:1rem; outline:none; color:var(--text);">
          <button onclick="impostaOraAttuale()" style="padding:0 16px; border-radius:8px; background:var(--cream); border:1px solid var(--border); color:var(--text); font-weight:600; cursor:pointer; font-family:inherit;">Ora</button>
        </div>
        <button class="choice-btn" id="apply-time-modal" style="margin-top:12px; width:100%; padding:14px; font-size:1rem;">Aggiorna!</button>
      </div>
      </div>
    </div>
  </div>

  <script src="bundle_orari.js"></script>
  <script>
    // ============================================================
    // ORARIO ENGINE (inlined)
    // ============================================================
    const FESTIVITA_FISSE = [[1, 1], [1, 6], [4, 25], [5, 1], [6, 2], [8, 15], [11, 1], [12, 7], [12, 8], [12, 25], [12, 26]];
    function calcolaPasqua(y) { const a = y % 19, b = Math.floor(y / 100), c = y % 100, d = Math.floor(b / 4), e = b % 4, f = Math.floor((b + 8) / 25), g = Math.floor((b - f + 1) / 3), h = (19 * a + b - d - g + 15) % 30, i = Math.floor(c / 4), k = c % 4, l = (32 + 2 * e + 2 * i - h - k) % 7, m = Math.floor((a + 11 * h + 22 * l) / 451), mo = Math.floor((h + l - 7 * m + 114) / 31), gi = ((h + l - 7 * m + 114) % 31) + 1; return new Date(y, mo - 1, gi); }
    function getTipoGiornata(date = new Date()) { let d = new Date(date); if (d.getHours() < 3) d.setDate(d.getDate() - 1); const g = d.getDay(), m = d.getMonth() + 1, gm = d.getDate(), y = d.getFullYear(); for (const [mm, gg] of FESTIVITA_FISSE) if (m === mm && gm === gg) return "festivo"; const pq = new Date(calcolaPasqua(y)); pq.setDate(pq.getDate() + 1); if (d.getMonth() === pq.getMonth() && d.getDate() === pq.getDate()) return "festivo"; if (g === 0) return "festivo"; if (g === 6) return "sabato"; return "feriale"; }
    function getNextTrains(data, dir, filtro = null, target = new Date(), n = 3) { const dd = data?.[dir]; if (!dd) return []; const tipo = getTipoGiornata(target), orari = dd[tipo]; if (!orari || !Object.keys(orari).length) return []; const oC = target.getHours(), mC = target.getMinutes(), res = []; for (let off = 0; off < 25 && res.length < n; off++) { const oT = (oC + off) % 24, oK = oT.toString().padStart(2, "0"), nodo = orari[oK]; if (nodo == null) continue; if (typeof nodo === "string") { if (off === 0) { let oF = oT; let skipOff = off; for (let lk = 1; lk < 25; lk++) { const nH = (oT + lk) % 24, nK = nH.toString().padStart(2, "0"); if (typeof orari[nK] === "string") { oF = nH; skipOff = off + lk; } else break; } const banner = { ora_partenza: null, destinazione: filtro || dir, minuti_attesa: null, tipo: "frequenza", messaggio: nodo, fascia_inizio: oT, fascia_fine: oF }; if (n <= 3) return [banner]; res.push(banner); off = skipOff; continue; } let oF = oT, skipOff = off; for (let lk = 1; lk < 25; lk++) { const nH = (oC + off + lk) % 24, nK = nH.toString().padStart(2, "0"); if (typeof orari[nK] === "string") { oF = nH; skipOff = off + lk; } else break; } res.push({ ora_partenza: null, destinazione: filtro || dir, minuti_attesa: null, tipo: "frequenza_blocco", messaggio: nodo, fascia_inizio: oT, fascia_fine: oF }); off = skipOff; continue; } if (typeof nodo === "object") { const treni = []; const dests = filtro ? { [filtro]: nodo[filtro] } : nodo; for (const [dest, mins] of Object.entries(dests)) { if (!Array.isArray(mins)) continue; for (const m of mins) { if (off === 0 && m < mC) continue; let att = (oT * 60 + m) - (oC * 60 + mC); if (att < 0) att += 1440; treni.push({ ora_partenza: `${oK}:${m.toString().padStart(2, "0")}`, destinazione: dest, minuti_attesa: att, tipo: "esatto" }); } } treni.sort((a, b) => a.minuti_attesa - b.minuti_attesa); for (const t of treni) { if (res.length >= n) break; res.push(t); } } } return res; }
    function formattaDest(n) { if (!n) return ""; return n.split("_").map(w => ["fs", "pza"].includes(w.toLowerCase()) ? w.toUpperCase() : /^\d+$/.test(w) ? w : w.charAt(0).toUpperCase() + w.slice(1).toLowerCase()).join(" "); }

    // ============================================================
    // DATI
    // ============================================================
    const BASE_URL = "https://raw.githubusercontent.com/simonetriozzi/orariogaia/main/json_orari/";

    // Stazioni M1 da Pagano a Sesto I Maggio (escluso ramo Rho e fermate dopo De Angeli verso Bisceglie)
    const STAZIONI_MILANO = [
      { id: "M1_Pagano", label: "Pagano" },
      { id: "M1_Conciliazione", label: "Conciliazione" },
      { id: "M1_Cadorna", label: "Cadorna" },
      { id: "M1_Cairoli", label: "Cairoli" },
      { id: "M1_Cordusio", label: "Cordusio" },
      { id: "M1_Duomo", label: "Duomo" },
      { id: "M1_San_Babila", label: "San Babila" },
      { id: "M1_Palestro", label: "Palestro" },
      { id: "M1_Porta_Venezia", label: "Porta Venezia" },
      { id: "M1_Lima", label: "Lima" },
      { id: "M1_Loreto", label: "Loreto" },
      { id: "M1_Pasteur", label: "Pasteur" },
      { id: "M1_Rovereto", label: "Rovereto" },
      { id: "M1_Turro", label: "Turro" },
      { id: "M1_Gorla", label: "Gorla" },
      { id: "M1_Precotto", label: "Precotto" },
      { id: "M1_Villa_S_Giovanni", label: "Villa S. Giovanni" },
      { id: "M1_Sesto_Marelli", label: "Sesto Marelli" },
      { id: "M1_Sesto_Rondo", label: "Sesto Rondò" },
      { id: "M1_Sesto_I_Maggio", label: "Sesto I Maggio FS" },
    ];

    // ============================================================
    // STATE
    // ============================================================
    let percorsoAttivo = null;
    let dataOraCorrente = new Date();
    let cacheJSON = {};
    let stazioneSelezionata = null;
    let limiteN = 3;

    async function caricaJSON(nome) {
      if (cacheJSON[nome]) return cacheJSON[nome];
      if (typeof BUNDLE_ORARI !== 'undefined' && BUNDLE_ORARI[nome]) {
        cacheJSON[nome] = BUNDLE_ORARI[nome];
        return cacheJSON[nome];
      }
      const r = await fetch(`${BASE_URL}${nome}.json`);
      if (!r.ok) throw new Error(`HTTP ${r.status}`);
      cacheJSON[nome] = await r.json();
      return cacheJSON[nome];
    }

    // ============================================================
    // ROUTING
    // ============================================================
    function scegliPercorso(tipo) {
      if (percorsoAttivo !== tipo) {
        limiteN = 3;
      }
      percorsoAttivo = tipo;
      stazioneSelezionata = null;

      document.getElementById('btn-casa').classList.toggle('active', tipo === 'casa');
      document.getElementById('btn-milano').classList.toggle('active', tipo === 'milano');

      if (tipo === 'casa') renderCasa();
      else renderMilano();
    }

    // ============================================================
    // PERCORSO CASA — De Angeli → Sesto
    // ============================================================
    async function renderCasa(targetDate) {
      const now = targetDate || dataOraCorrente;
      const content = document.getElementById('main-content');

      content.innerHTML = `<div class="panel"><div class="loading"><div class="spinner"></div><p>Cerco i treni…</p></div></div>`;

      try {
        const data = await caricaJSON('M1_De_Angeli');
        const treni = getNextTrains(data, 'sesto_1_maggio_fs', null, now, limiteN);
        const tipo = getTipoGiornata(now);
        const oraStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

        let html = `<div class="panel">
      <div class="panel-title"> 🏡 De Angeli → Sesto I Maggio FS</div>
      <div style="font-size:0.75rem;color:var(--text-soft);margin-bottom:14px;">
        ${oraStr} · ${tipo}
      </div>`;
        html += renderTreni(treni);
        if(treni.length > 0) {
          html += `<button class="more-btn" onclick="mostraSuccessivoGaia()">+ Mostra successivo</button>`;
        }
        html += `</div>`;
        content.innerHTML = html;
      } catch (e) {
        document.getElementById('main-content').innerHTML =
          `<div class="panel"><div class="empty">⚠️ Errore nel caricamento. Riprova.</div></div>`;
      }
    }

    // ============================================================
    // PERCORSO MILANO — Ricerca stazione → Bisceglie
    // ============================================================
    function renderMilano() {
      const content = document.getElementById('main-content');
      content.innerHTML = `
    <div class="panel">
      <div class="panel-title">😴 Da dove parti?</div>
      <div class="search-wrap">
        <span class="search-icon">🔍</span>
        <input type="text" class="search-input" id="search-stazione" placeholder="Digita una stazione…" autocomplete="off">
        <div class="suggestions" id="suggestions" style="display:none"></div>
      </div>
    </div>
    <div id="result-milano" style="margin-top:0"></div>`;

      const input = document.getElementById('search-stazione');
      const sugBox = document.getElementById('suggestions');

      input.addEventListener('input', () => {
        const q = input.value.trim().toLowerCase();
        if (!q) { sugBox.style.display = 'none'; return; }

        const matches = STAZIONI_MILANO.filter(s => s.label.toLowerCase().includes(q));
        if (!matches.length) { sugBox.style.display = 'none'; return; }

        sugBox.innerHTML = matches.map(s => {
          const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&')})`, 'gi');
          const label = s.label.replace(re, '<mark>$1</mark>');
          return `<div class="suggestion-item" data-id="${s.id}" data-label="${s.label}">${label}</div>`;
        }).join('');
        sugBox.style.display = 'block';

        sugBox.querySelectorAll('.suggestion-item').forEach(el => {
          el.addEventListener('click', () => {
            input.value = el.dataset.label;
            sugBox.style.display = 'none';
            limiteN = 3;
            selezionaStazione(el.dataset.id, el.dataset.label);
          });
        });
      });

      document.addEventListener('click', (e) => {
        if (!e.target.closest('.search-wrap')) sugBox.style.display = 'none';
      }, { once: false });
    }

    async function selezionaStazione(id, label) {
      stazioneSelezionata = id;
      const result = document.getElementById('result-milano');
      result.innerHTML = `<div class="panel" style="margin-top:18px"><div class="loading"><div class="spinner"></div><p>Cerco i treni…</p></div></div>`;

      try {
        const data = await caricaJSON(id);
        const now = dataOraCorrente;
        // Direzione Bisceglie: rho_fiera_bisceglie, filtro bisceglie
        const treni = getNextTrains(data, 'rho_fiera_bisceglie', 'bisceglie', now, limiteN);
        const tipo = getTipoGiornata(now);
        const oraStr = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');

        let html = `<div class="panel" style="margin-top:18px">
      <div class="panel-title">🚇 ${label} → 🏡 Casa</div>
      <div style="font-size:0.75rem;color:var(--text-soft);margin-bottom:14px;">${oraStr} · ${tipo}</div>`;
        html += renderTreni(treni);
        if(treni.length > 0) {
          html += `<button class="more-btn" onclick="mostraSuccessivoGaia()">+ Mostra successivo</button>`;
        }
        html += `</div>`;
        result.innerHTML = html;
      } catch (e) {
        result.innerHTML = `<div class="panel" style="margin-top:18px"><div class="empty">⚠️ Errore nel caricamento.</div></div>`;
      }
    }

    // ============================================================
    // RENDER HELPERS
    // ============================================================
    function renderTreni(treni) {
      if (!treni.length) return `<div class="empty">Nessun treno disponibile in questa fascia oraria 🌙</div>`;

      if (treni.length === 1 && treni[0].tipo === 'frequenza') {
        const t = treni[0];
        const msg = t.messaggio.split(/every/i)[0].trim();
        const fasciaStr = `Dalle ${String(t.fascia_inizio).padStart(2,'0')}:00 alle ${String(t.fascia_fine).padStart(2,'0')}:59`;
        return `<div class="freq-banner">
      <div class="icon">🚇</div>
      <div class="freq-text">${msg}</div>
      <div class="freq-sub">${fasciaStr} — Alta frequenza, non serve controllare gli orari!</div>
    </div>
    <button class="more-btn" onclick="mostraSuccessivoGaia()">+ Mostra metro dopo alta frequenza</button>`;
      }

      let html = treni.map(t => {
        if (t.tipo === 'frequenza_blocco' || t.tipo === 'frequenza') {
          const msg = t.messaggio.split(/every/i)[0].trim();
          const fasciaStr = `Dalle ${String(t.fascia_inizio).padStart(2,'0')}:00 alle ${String(t.fascia_fine).padStart(2,'0')}:59`;
          return `<div class="freq-banner" style="margin:8px 0">
      <div class="icon">🚇</div>
      <div class="freq-text">${msg}</div>
      <div class="freq-sub">${fasciaStr} — Alta frequenza</div>
    </div>`;
        }
        return `
    <div class="train-card">
      <div class="train-time">${t.ora_partenza}</div>
      <div class="train-info">
        <div class="train-dest">${formattaDest(t.destinazione)}</div>
        <div class="train-wait">Treno programmato</div>
      </div>
      <div class="train-eta">${t.minuti_attesa}<span> min</span></div>
    </div>`;
      }).join('');
      
      return html;
    }

    function mostraSuccessivoGaia() {
      limiteN++;
      if (percorsoAttivo === 'casa') {
        renderCasa();
      } else {
        selezionaStazione(stazioneSelezionata, document.getElementById('search-stazione').value);
      }
    }

    function apriModalTime() {
      const now = dataOraCorrente;
      document.getElementById('inp-date').value = now.toISOString().split('T')[0];
      document.getElementById('inp-time').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
      document.getElementById('time-modal').style.display = 'flex';
    }

    function chiudiModalTime(e) {
      if(e && e.target !== e.currentTarget) return;
      document.getElementById('time-modal').style.display = 'none';
    }

    document.getElementById('apply-time-modal').addEventListener('click', () => {
      const d = document.getElementById('inp-date').value;
      const t = document.getElementById('inp-time').value;
      if (d && t) {
        dataOraCorrente = new Date(`${d}T${t}`);
        chiudiModalTime();
        if (percorsoAttivo === 'casa') renderCasa();
        else if (stazioneSelezionata) selezionaStazione(stazioneSelezionata, document.getElementById('search-stazione').value);
      }
    });

    function impostaOraAttuale() {
      const now = new Date();
      document.getElementById('inp-date').value = now.toISOString().split('T')[0];
      document.getElementById('inp-time').value = now.getHours().toString().padStart(2, '0') + ':' + now.getMinutes().toString().padStart(2, '0');
    }

    // Seleziona automaticamente "Esco! 😁" al caricamento della pagina
    scegliPercorso('casa');
  </script>
</body>

</html>
