<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="OrarioSimone">
  <link rel="apple-touch-icon" href="https://simonetriozzi.github.io/orariogaia/apple-touch-icon.png">
  <link rel="manifest" href="manifest_simone.json">
  <title>OrarioSimone</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #1c1c1e;
      --surface:  #2c2c2e;
      --border:   rgba(255,255,255,0.08);
      --text:     #f2f2f7;
      --muted:    #8e8e93;
      --accent:   #0a84ff;
      --green:    #30d158;
      --radius:   14px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 36px 20px 60px;
      padding-top: calc(36px + env(safe-area-inset-top));
      padding-bottom: calc(60px + env(safe-area-inset-bottom));
      -webkit-font-smoothing: antialiased;
    }

    .back-link {
      align-self: flex-start; margin-bottom: 28px;
      font-size: 0.85rem; font-weight: 600; color: var(--muted);
      text-decoration: none; transition: color 0.2s;
    }
    .back-link:hover { color: var(--text); }

    h1 {
      font-size: clamp(2rem, 8vw, 3.2rem);
      font-weight: 900;
      letter-spacing: -1px;
      margin-bottom: 36px;
      text-align: center;
    }

    /* === PRESET BUTTONS === */
    .presets { width: 100%; max-width: 400px; display: flex; flex-direction: column; gap: 12px; margin-bottom: 20px; }

    .preset-btn {
      width: 100%; padding: 20px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-family: inherit; font-size: 1.1rem; font-weight: 700;
      text-align: left; cursor: pointer;
      display: flex; justify-content: space-between; align-items: center;
      transition: background 0.15s, border-color 0.15s;
    }
    .preset-btn:hover { background: #3a3a3c; border-color: rgba(255,255,255,0.15); }
    .preset-btn.active { border-color: var(--accent); background: rgba(10,132,255,0.12); }
    .preset-btn .sub { font-size: 0.75rem; font-weight: 500; color: var(--muted); margin-top: 3px; }
    .preset-btn .label-wrap { display: flex; flex-direction: column; }
    .preset-btn .arrow { font-size: 1.2rem; opacity: 0.4; }

    /* Altro btn */
    .altro-btn {
      width: 100%; max-width: 400px; padding: 16px 24px;
      background: transparent; border: 1px solid var(--border);
      border-radius: var(--radius); color: var(--muted);
      font-family: inherit; font-size: 0.95rem; font-weight: 600;
      cursor: pointer; transition: all 0.15s;
      margin-bottom: 28px;
    }
    .altro-btn:hover { border-color: rgba(255,255,255,0.2); color: var(--text); }

    /* === SEARCH === */
    .search-section { width: 100%; max-width: 400px; margin-bottom: 20px; }
    .search-wrap { position: relative; }
    .search-input {
      width: 100%; padding: 14px 16px 14px 42px;
      background: var(--surface); color: var(--text);
      border: 1px solid var(--border); border-radius: var(--radius);
      font-family: inherit; font-size: 0.95rem; font-weight: 500;
      outline: none; transition: border-color 0.2s;
    }
    .search-input:focus { border-color: var(--accent); }
    .search-input::placeholder { color: var(--muted); }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); opacity: 0.5; pointer-events: none; }
    .suggestions {
      position: absolute; top: calc(100% + 6px); left: 0; right: 0; z-index: 20;
      background: #3a3a3c; border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: 0 8px 28px rgba(0,0,0,0.5);
      max-height: 240px; overflow-y: auto;
    }
    .sug-item {
      padding: 12px 16px; cursor: pointer;
      font-size: 0.9rem; font-weight: 500;
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 8px;
      transition: background 0.12s;
    }
    .sug-item:last-child { border-bottom: none; }
    .sug-item:hover { background: rgba(255,255,255,0.06); }
    .sug-item mark { background: none; color: var(--accent); font-weight: 700; }
    .line-pill {
      font-size: 0.62rem; font-weight: 800; padding: 2px 6px;
      border-radius: 4px; flex-shrink: 0;
    }
    .line-pill.m2 { background: #30d158; color: #000; }
    .line-pill.m1 { background: #ff3b30; color: #fff; }

    /* === RESULTS === */
    .result-box {
      width: 100%; max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
      animation: fadeUp 0.3s ease-out;
    }
    .result-title {
      font-size: 0.72rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      margin-bottom: 14px;
    }
    .train-row {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 0; border-bottom: 1px solid var(--border);
    }
    .train-row:last-of-type { border-bottom: none; }
    .train-time { font-size: 1.4rem; font-weight: 700; min-width: 58px; font-variant-numeric: tabular-nums; }
    .train-info { flex: 1; }
    .train-dest { font-size: 0.85rem; font-weight: 600; color: var(--text); }
    .train-sub  { font-size: 0.75rem; color: var(--muted); margin-top: 1px; }
    .train-eta  { font-size: 1rem; font-weight: 700; color: var(--accent); text-align: right; }
    .train-eta small { font-size: 0.65rem; font-weight: 500; color: var(--muted); }

    .freq-box { text-align: center; padding: 18px 0; }
    .freq-box .f-icon { font-size: 1.6rem; margin-bottom: 6px; }
    .freq-box .f-text { font-size: 1rem; font-weight: 700; color: var(--green); }
    .freq-box .f-sub { font-size: 0.78rem; color: var(--muted); margin-top: 4px; }

    .empty-box { text-align: center; padding: 20px; color: var(--muted); font-size: 0.9rem; }

    /* === TIME EDITOR === */
    .time-editor {
      width: 100%; max-width: 400px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      margin-bottom: 28px;
    }
    .time-editor label {
      display: block; font-size: 0.68rem; font-weight: 700;
      color: var(--muted); text-transform: uppercase;
      letter-spacing: 0.7px; margin-bottom: 10px;
    }
    .time-row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
    .time-row input[type="date"],
    .time-row input[type="time"] {
      flex: 1; min-width: 110px; padding: 9px 12px;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; font-family: inherit; font-size: 0.9rem;
      color: var(--text); outline: none; transition: border-color 0.2s;
    }
    .time-row input:focus { border-color: var(--accent); }
    .apply-btn {
      padding: 9px 16px;
      background: var(--accent); color: #fff; border: none;
      border-radius: 8px; font-family: inherit;
      font-size: 0.85rem; font-weight: 700; cursor: pointer;
      transition: opacity 0.2s; white-space: nowrap;
    }
    .apply-btn:hover { opacity: 0.85; }

    /* === INLINE RESULT PANEL === */
    .preset-item { width: 100%; max-width: 400px; }
    .inline-result {
      overflow: hidden;
      max-height: 0;
      transition: max-height 0.45s cubic-bezier(0.4,0,0.2,1), opacity 0.35s ease;
      opacity: 0;
    }
    .inline-result.open {
      max-height: 600px;
      opacity: 1;
    }
    .inline-result-inner {
      background: rgba(10,132,255,0.07);
      border: 1px solid rgba(10,132,255,0.2);
      border-top: none;
      border-radius: 0 0 var(--radius) var(--radius);
      padding: 0 16px;
      transform: translateY(-4px);
      transition: transform 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .inline-result.open .inline-result-inner { transform: translateY(0); }

    /* active button: square bottom corners when open */
    .preset-item.open .preset-btn {
      border-radius: var(--radius) var(--radius) 0 0;
      border-color: rgba(10,132,255,0.4);
      background: rgba(10,132,255,0.12);
    }
    .preset-item.open .preset-btn .arrow {
      transform: rotate(90deg);
      opacity: 0.9;
    }
    .preset-btn .arrow { transition: transform 0.3s ease, opacity 0.2s; }

    /* train rows inside inline panel */
    .inline-result .train-row {
      padding: 13px 0;
      display: flex; align-items: center; gap: 12px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }
    .inline-result .train-row:last-of-type { border-bottom: none; }
    .inline-result .train-row:first-child { padding-top: 16px; }
    .inline-result .train-row:last-child  { padding-bottom: 16px; }
    .inline-result .result-title {
      font-size: 0.65rem; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: 0.8px;
      padding-top: 14px; margin-bottom: 0;
    }

    /* shimmer loading */
    @keyframes shimmer {
      0%   { background-position: -400px 0; }
      100% { background-position: 400px 0; }
    }
    .skeleton {
      height: 18px; border-radius: 6px; margin: 10px 0;
      background: linear-gradient(90deg, #3a3a3c 25%, #4a4a4c 50%, #3a3a3c 75%);
      background-size: 800px 100%;
      animation: shimmer 1.2s infinite;
    }
    .skeleton-wrap { padding: 16px 0; }

    /* alto freq */
    .inline-result .freq-box { padding: 16px 0; }

    .more-btn {
      display: block; width: 100%; padding: 14px;
      margin-top: 10px; background: rgba(255,255,255,0.05);
      border: 1px dashed rgba(255,255,255,0.15); border-radius: var(--radius);
      color: var(--text); font-family: inherit; font-size: 0.9rem; font-weight: 600;
      cursor: pointer; transition: all 0.2s; text-align: center;
    }
    .more-btn:hover { background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

    @keyframes fadeUp { from { opacity:0; transform:translateY(8px); } to { opacity:1; transform:translateY(0); } }

    /* altro section */
    .altro-section { width: 100%; max-width: 400px; }
    .altro-result {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 16px;
      margin-top: 12px;
      animation: fadeUp 0.35s ease-out;
    }

    @media (max-width: 440px) { h1 { font-size: 2rem; } .preset-btn { font-size: 1rem; } }
  </style>
</head>
<body>

<h1>Dove ti trovi?</h1>

<!-- EDITOR ORARIO -->
<div class="time-editor">
  <label>⏰ Data e orario di partenza</label>
  <div class="time-row">
    <input type="date" id="inp-date">
    <input type="time" id="inp-time">
    <button class="apply-btn" id="apply-time">Aggiorna</button>

</div>

<!-- PRESET BUTTONS -->
<div class="presets">

  <div class="preset-item" id="item-casa">
    <button class="preset-btn" onclick="scegli('casa')">
      <div class="label-wrap">
        <span>🏠 CASA</span>

  <div class="preset-item" id="item-poli">
    <button class="preset-btn" onclick="scegli('poli')">

        <span class="sub">Piola → Cologno Nord</span>
      </div>
      <span class="arrow">›</span>
    </button>
    <div class="inline-result" id="res-poli">
      <div class="inline-result-inner" id="res-poli-inner"></div>
    </div>
  </div>

  <div class="preset-item" id="item-loreto">
    <button class="preset-btn" onclick="scegli('loreto')">
      <div class="label-wrap">
        <span>🛍️ LORETO</span>
        <span class="sub">Loreto → Cologno Nord</span>

  <div class="preset-item" id="item-unicatt">

      <div class="label-wrap">
        <span>📚 UNICATT</span>
        <span class="sub">S. Ambrogio → Cologno Nord</span>
      </div>
      <span class="arrow">›</span>
    </button>
    <div class="inline-result" id="res-unicatt">
      <div class="inline-result-inner" id="res-unicatt-inner"></div>
    </div>
  </div>

</div>

<!-- ALTRO / CERCA -->
<div class="altro-section">
  <button class="altro-btn" id="btn-altro" onclick="toggleAltro()">🔍 Altro — Cerca stazione</button>
  <div id="search-section" style="display:none">
    <div class="search-wrap">
      <span class="search-icon">🚇</span>
      <input type="text" id="inp-stazione" class="search-input" placeholder="Cerca stazione M2…" autocomplete="off">
      <div class="suggestions" id="sug-box" style="display:none"></div>
    </div>
    <div id="res-altro"></div>
  </div>
</div>

<div style="margin-top:40px;width:100%;max-width:400px;display:flex;justify-content:center;">
  <a href="index.html" class="back-link" style="align-self:center;margin-bottom:0;">← Home</a>
</div>

<script src="bundle_orari.js"></script>
<script>
// ============================================================
// ENGINE
// ============================================================
const FEST = [[1,1],[1,6],[4,25],[5,1],[6,2],[8,15],[11,1],[12,7],[12,8],[12,25],[12,26]];
function pasqua(y){const a=y%19,b=Math.floor(y/100),c=y%100,d=Math.floor(b/4),e=b%4,f=Math.floor((b+8)/25),g=Math.floor((b-f+1)/3),h=(19*a+b-d-g+15)%30,i=Math.floor(c/4),k=c%4,l=(32+2*e+2*i-h-k)%7,m=Math.floor((a+11*h+22*l)/451),mo=Math.floor((h+l-7*m+114)/31),gi=((h+l-7*m+114)%31)+1;return new Date(y,mo-1,gi);}
function tipoGiornata(d=new Date()){let x=new Date(d);if(x.getHours()<3)x.setDate(x.getDate()-1);const g=x.getDay(),m=x.getMonth()+1,gm=x.getDate(),y=x.getFullYear();for(const[mm,gg]of FEST)if(m===mm&&gm===gg)return"festivo";const pq=new Date(pasqua(y));pq.setDate(pq.getDate()+1);if(x.getMonth()===pq.getMonth()&&x.getDate()===pq.getDate())return"festivo";if(g===0)return"festivo";if(g===6)return"sabato";return"feriale";}
function nextTrains(data,dir,filtro=null,target=new Date(),n=3){const dd=data?.[dir];if(!dd)return[];const tipo=tipoGiornata(target),orari=dd[tipo];if(!orari||!Object.keys(orari).length)return[];const oC=target.getHours(),mC=target.getMinutes(),res=[];for(let off=0;off<25&&res.length<n;off++){const oT=(oC+off)%24,oK=oT.toString().padStart(2,"0"),nodo=orari[oK];if(nodo==null)continue;if(typeof nodo==="string"){if(off===0){let oF=oT;let skipOff=off;for(let lk=1;lk<25;lk++){const nH=(oT+lk)%24,nK=nH.toString().padStart(2,"0");if(typeof orari[nK]==="string"){oF=nH;skipOff=off+lk;}else break;}const banner = {t:null,dest:filtro||dir,att:null,freq:true,tipo:"frequenza",msg:nodo,fascia_inizio:oT,fascia_fine:oF};if(n<=3)return [banner];res.push(banner);off=skipOff;continue;}let oF=oT,skipOff=off;for(let lk=1;lk<25;lk++){const nH=(oC+off+lk)%24,nK=nH.toString().padStart(2,"0");if(typeof orari[nK]==="string"){oF=nH;skipOff=off+lk;}else break;}res.push({t:null,dest:filtro||dir,att:null,freq:true,tipo:"frequenza_blocco",msg:nodo,fascia_inizio:oT,fascia_fine:oF});off=skipOff;continue;}if(typeof nodo==="object"){const arr=[];const dests=filtro?{[filtro]:nodo[filtro]}:nodo;for(const[dest,mins]of Object.entries(dests)){if(!Array.isArray(mins))continue;for(const m of mins){if(off===0&&m<mC)continue;let att=(oT*60+m)-(oC*60+mC);if(att<0)att+=1440;arr.push({t:`${oK}:${m.toString().padStart(2,"0")}`,dest,att,freq:false,tipo:"esatto"});}}arr.sort((a,b)=>a.att-b.att);for(const t of arr){if(res.length>=n)break;res.push(t);}}}return res;}
function fmt(n){if(!n)return"";return n.split("_").map(w=>["fs","pza"].includes(w.toLowerCase())?w.toUpperCase():/^\d+$/.test(w)?w:w.charAt(0).toUpperCase()+w.slice(1).toLowerCase()).join(" ");}

// ============================================================
// STATE
// ============================================================
const BASE = "https://raw.githubusercontent.com/simonetriozzi/orariogaia/main/json_orari/";
let dataOra = new Date();
let cache = {};
let percorso = null;
let limiteN = 3;

// Init time inputs
const inpDate = document.getElementById('inp-date');
const inpTime = document.getElementById('inp-time');
function setTimeInputs(d){
  inpDate.value = d.toISOString().split('T')[0];
  inpTime.value = d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0');
}
setTimeInputs(dataOra);


// ============================================================
// PRESET ROUTES
// ============================================================
const PRESETS = {
  casa:    { stazione:'M2_Cologno_Sud',  dir:'abbiategrasso_assago_forum', filtro:'assago_forum',   titolo:'Cologno Sud → Assago / Abbiategrasso' },
  poli:    { stazione:'M2_Piola',        dir:'gessate_cologno_nord',       filtro:'cologno_nord',  titolo:'Piola → Cologno Nord' },
  loreto:  { stazione:'M2_Loreto',       dir:'gessate_cologno_nord',       filtro:'cologno_nord',  titolo:'Loreto → Cologno Nord' },
  unicatt: { stazione:'M2_S_Ambrogio',   dir:'gessate_cologno_nord',       filtro:'cologno_nord',  titolo:'S. Ambrogio → Cologno Nord' },
};

function scegli(id){
  // Close others, toggle current
  const ids = ['casa','poli','loreto','unicatt'];
  const item = document.getElementById('item-'+id);
  const res  = document.getElementById('res-'+id);
  const isOpen = item.classList.contains('open');

  // Close all
  ids.forEach(k => {
    document.getElementById('item-'+k).classList.remove('open');
    document.getElementById('res-'+k).classList.remove('open');
  });
  document.getElementById('search-section').style.display = 'none';

  if(!isOpen){
    limiteN = 3;
    percorso = PRESETS[id];
    item.classList.add('open');
    res.classList.add('open');
    // Show skeleton immediately
    document.getElementById('res-'+id+'-inner').innerHTML = `
      <div class="result-title">${percorso.titolo}</div>
      <div class="skeleton-wrap">
        <div class="skeleton" style="width:60%"></div>
        <div class="skeleton" style="width:80%"></div>
        <div class="skeleton" style="width:50%"></div>
      </div>`;
    esegui(percorso.stazione, percorso.dir, percorso.filtro, percorso.titolo, 'res-'+id+'-inner');
  } else {
    percorso = null;
  }
}

// ============================================================
// ALTRO — SEARCH
// ============================================================
const STAZIONI_M2 = [
  {id:"M2_Gessate",label:"Gessate"},{id:"M2_Cascina_Antonietta",label:"Cascina Antonietta"},
  {id:"M2_Gorgonzola",label:"Gorgonzola"},{id:"M2_Villa_Pompea",label:"Villa Pompea"},
  {id:"M2_Bussero",label:"Bussero"},{id:"M2_Cassina_de_Pecchi",label:"Cassina de' Pecchi"},
  {id:"M2_Villa_Fiorita",label:"Villa Fiorita"},{id:"M2_Cernusco",label:"Cernusco S.N."},
  {id:"M2_Cascina_Burrona",label:"Cascina Burrona"},{id:"M2_Vimodrone",label:"Vimodrone"},
  {id:"M2_Cologno_Nord",label:"Cologno Nord"},{id:"M2_Cologno_Centro",label:"Cologno Centro"},
  {id:"M2_Cologno_Sud",label:"Cologno Sud"},{id:"M2_Cascina_Gobba",label:"Cascina Gobba"},
  {id:"M2_Crescenzago",label:"Crescenzago"},{id:"M2_Cimiano",label:"Cimiano"},
  {id:"M2_Udine",label:"Udine"},{id:"M2_Lambrate",label:"Lambrate"},
  {id:"M2_Piola",label:"Piola"},{id:"M2_Loreto",label:"Loreto"},
  {id:"M2_Caiazzo",label:"Caiazzo"},{id:"M2_Centrale",label:"Centrale"},
  {id:"M2_Gioia",label:"Gioia"},{id:"M2_Garibaldi",label:"Garibaldi"},
  {id:"M2_Moscova",label:"Moscova"},{id:"M2_Lanza",label:"Lanza"},
  {id:"M2_Cadorna",label:"Cadorna"},{id:"M2_S_Ambrogio",label:"S. Ambrogio"},
  {id:"M2_S_Agostino",label:"S. Agostino"},{id:"M2_Porta_Genova",label:"Porta Genova"},
  {id:"M2_Romolo",label:"Romolo"},{id:"M2_Famagosta",label:"Famagosta"},
  {id:"M2_Abbiategrasso",label:"Abbiategrasso"},{id:"M2_Assago_M_Nord",label:"Assago Milanofiori Nord"},
  {id:"M2_Assago_M_Forum",label:"Assago Milanofiori Forum"},
];

function toggleAltro(){
  const sec = document.getElementById('search-section');
  const shown = sec.style.display !== 'none';
  // Close all presets
  ['casa','poli','loreto','unicatt'].forEach(k => {
    document.getElementById('item-'+k).classList.remove('open');
    document.getElementById('res-'+k).classList.remove('open');
  });
  sec.style.display = shown ? 'none' : 'block';
  if(!shown) document.getElementById('inp-stazione').focus();
  percorso = null;
  limiteN = 3;
}

const inpSt = document.getElementById('inp-stazione');
const sugB  = document.getElementById('sug-box');

inpSt.addEventListener('input', () => {
  const q = inpSt.value.trim().toLowerCase();
  if(!q){ sugB.style.display='none'; return; }
  const matches = STAZIONI_M2.filter(s=>s.label.toLowerCase().includes(q));
  if(!matches.length){ sugB.style.display='none'; return; }
  const re = new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  sugB.innerHTML = matches.map(s=>`
    <div class="sug-item" data-id="${s.id}" data-label="${s.label}">
      <span class="line-pill m2">M2</span>
      <span>${s.label.replace(re,'<mark>$1</mark>')}</span>
    </div>`).join('');
  sugB.style.display='block';
  sugB.querySelectorAll('.sug-item').forEach(el=>{
    el.addEventListener('click',()=>{
      inpSt.value = el.dataset.label;
      sugB.style.display='none';
      limiteN = 3;
      percorso = { stazione:el.dataset.id, dir:'gessate_cologno_nord', filtro:'cologno_nord', titolo:`${el.dataset.label} → Cologno Nord` };
      const resAltro = document.getElementById('res-altro');
      resAltro.innerHTML = `<div class="altro-result"><div class="skeleton-wrap"><div class="skeleton" style="width:70%"></div><div class="skeleton"></div><div class="skeleton" style="width:55%"></div></div></div>`;
      esegui(percorso.stazione, percorso.dir, percorso.filtro, percorso.titolo, 'res-altro', true);
    });
  });
});

document.addEventListener('click', e=>{ if(!e.target.closest('.search-wrap')) sugB.style.display='none'; });

// ============================================================
// FETCH + RENDER
// ============================================================
async function esegui(stazione, dir, filtro, titolo, targetId='res-altro', wrap=false){
  const box = document.getElementById(targetId);
  if(!box) return;
  try {
    if(!cache[stazione]){
      if (typeof BUNDLE_ORARI !== 'undefined' && BUNDLE_ORARI[stazione]) {
        cache[stazione] = BUNDLE_ORARI[stazione];
      } else {
        const r = await fetch(`${BASE}${stazione}.json`);
        if(!r.ok) throw new Error('HTTP '+r.status);
        cache[stazione] = await r.json();
      }
    }
    const data = cache[stazione];
    let treni = nextTrains(data, dir, filtro, dataOra, limiteN);
    const tipo = tipoGiornata(dataOra);
    const oraStr = dataOra.getHours().toString().padStart(2,'0')+':'+dataOra.getMinutes().toString().padStart(2,'0');
    renderRisultati(treni, titolo, tipo, oraStr, targetId, wrap);
  } catch(e){
    const box = document.getElementById(targetId);
    if(box) box.innerHTML = `<div class="empty-box" style="padding:16px">⚠️ Errore caricamento</div>`;
  }
}

function renderRisultati(treni, titolo, tipo, oraStr, targetId, wrap=false){
  let inner = `<div class="result-title">${titolo} · ${oraStr} · ${tipo}</div>`;

  if(!treni.length){
    inner += `<div class="empty-box" style="padding:12px 0 16px">🌙 Nessun treno in questa fascia oraria</div>`;
  } else if(treni.length === 1 && treni[0].freq && treni[0].t===null && treni[0].tipo==="frequenza"){
    // Siamo GIÀ dentro una fascia di alta frequenza
    const t = treni[0];
    const msg = t.msg.split(/every/i)[0].trim();
    const fasciaStr = `Dalle ${String(t.fascia_inizio).padStart(2,'0')}:00 alle ${String(t.fascia_fine).padStart(2,'0')}:59`;
    inner += `<div class="freq-box">
      <div class="f-icon">🚇</div>
      <div class="f-text">${msg}</div>
      <div class="f-sub">${fasciaStr} — Alta frequenza, controlla lo schermo</div>
    </div>
    <button class="more-btn" onclick="mostraSuccessivo('${targetId}', ${wrap})">+ Mostra metro dopo alta frequenza</button>`;
  } else {
    // Mix di treni esatti e possibili blocchi di alta frequenza
    let hasExactTrains = false;
    inner += treni.map((t,i) => {
      if(t.tipo === "frequenza_blocco" || t.tipo === "frequenza") {
        const msg = t.msg.split(/every/i)[0].trim();
        const fasciaStr = `Dalle ${String(t.fascia_inizio).padStart(2,'0')}:00 alle ${String(t.fascia_fine).padStart(2,'0')}:59`;
        return `<div class="freq-box" style="animation:fadeUp 0.3s ease-out ${i*0.07}s both;margin:8px 0">
          <div class="f-icon">🚇</div>
          <div class="f-text">${msg}</div>
          <div class="f-sub">${fasciaStr} — Alta frequenza</div>
        </div>`;
      }
      hasExactTrains = true;
      return `
      <div class="train-row" style="animation:fadeUp 0.3s ease-out ${i*0.07}s both">
        <div class="train-time">${t.t}</div>
        <div class="train-info">
          <div class="train-dest">${fmt(t.dest)}</div>
          <div class="train-sub">tra ${t.att} min</div>
        </div>
        <div class="train-eta">${t.att}<small> min</small></div>
      </div>`;
    }).join('');
    
    // Add "Load more" button
    inner += `<button class="more-btn" onclick="mostraSuccessivo('${targetId}', ${wrap})">+ Mostra successivo</button>`;
  }

  const box = document.getElementById(targetId);
  if(!box) return;
  if(wrap){
    box.innerHTML = `<div class="altro-result">${inner}</div>`;
  } else {
    box.innerHTML = inner;
  }
}

function mostraSuccessivo(targetId, wrap) {
  limiteN++;
  esegui(percorso.stazione, percorso.dir, percorso.filtro, percorso.titolo, targetId, wrap);
}

// Also update apply-time to re-render in the correct target
document.getElementById('apply-time').addEventListener('click', () => {
  if(inpDate.value && inpTime.value){
    dataOra = new Date(`${inpDate.value}T${inpTime.value}`);
    if(percorso){
      const ids = ['casa','poli','loreto','unicatt'];
      for(const k of ids){
        if(document.getElementById('item-'+k)?.classList.contains('open')){
          esegui(percorso.stazione, percorso.dir, percorso.filtro, percorso.titolo, 'res-'+k+'-inner');
          return;
        }
      }
      // altro
      esegui(percorso.stazione, percorso.dir, percorso.filtro, percorso.titolo, 'res-altro', true);
    }
  }
});
